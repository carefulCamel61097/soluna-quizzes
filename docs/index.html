<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soluna Quizzes</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <h1>Soluna Quizzes</h1>
    <p class="tagline">Pick a quiz to play.</p>
  </header>

  <main>
    <div id="theme-toggle" class="theme-toggle" role="tablist" aria-label="Filter quizzes by theme"></div>
    <div id="quiz-sections" aria-live="polite">
      <p class="loading">Loading quizzes…</p>
    </div>
  </main>

  <footer class="site-footer">
    <p>All quizzes are adapted, with thanks, from the videos of
      <a href="https://www.instagram.com/solunaaaa16/" rel="noopener">@solunaaaa16</a> on Instagram.
      This is a small private project for family &amp; friends — made to share their quizzes, not to
      replace or take credit for them. Go watch the originals!</p>
  </footer>

  <script src="js/index.js"></script>
</body>
</html>
